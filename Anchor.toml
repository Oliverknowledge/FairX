[toolchain]
anchor_version = "1.1.2"
solana_version = "3.1.10"
package_manager = "npm"

[features]
resolution = true
skip-lint = false

[programs.localnet]
lineguard = "6k8uu3N8Eedd26be6v96Dfs5H2YrikbhQe7sSz8HWdSe"
fairx_vault_v4 = "2x3vhmoj2itZYkFejDUBfTFUy59VK4APKDU4GvSqyF7p"

[programs.devnet]
lineguard = "6k8uu3N8Eedd26be6v96Dfs5H2YrikbhQe7sSz8HWdSe"
fairx_vault_v4 = "2x3vhmoj2itZYkFejDUBfTFUy59VK4APKDU4GvSqyF7p"

[provider]
cluster = "localnet"
wallet = "~/.config/solana/id.json"

# Inject the genuine TxLINE daily-scores root account (owned by the TxLINE program) into the
# local validator so submit_txline_validation's on-chain root binding can be tested end-to-end.
[test.validator]
url = "https://api.devnet.solana.com"

[[test.validator.account]]
address = "EUCbk9vftUek4vChr6rnXP9hhR8UuHGBDJKLsAQTZ9Zr"
filename = "fixtures/txline/daily-scores-root-account.json"

[[test.validator.account]]
address = "ACo4UtSFM5jtUeQwkrWuv7uDS9qeNVQv858eRBTKpHxh"
filename = "fixtures/txline/daily-odds-root-account.json"

# Clone the genuine executable TxLINE devnet program so v2 direct-CPI resolution
# is exercised locally against the official validateStatV2 implementation.
[[test.validator.clone]]
address = "6pW64gN1s2uqjHkn1unFeEjAwJkPGHoppGvS715wyP2J"

[scripts]
test = "npm exec -- ts-mocha -p ./tsconfig.anchor.json -t 1000000 \"tests/**/*.ts\""

[hooks]
